global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
  # 1. مراقبة بروميثيوس لنفسه
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 3. مراقبة أداء الـ API والطلبات من الباكيند
  - job_name: 'backend-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:5000']
