# 1. تحويل كل الترافيك القادم عبر HTTP إلى HTTPS تلقائياً
server {
    listen 80;
    server_name purplelotus.qzz.io;

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. خادم الـ HTTPS الآمن (بورت 443)
server {
    listen 443 ssl;
    server_name purplelotus.qzz.io;

    # مسارات الشهادة الحقيقية التي أصدرها Certbot
    ssl_certificate /etc/letsencrypt/live/purplelotus.qzz.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purplelotus.qzz.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ترافيك الباك إند
    location /api {
        proxy_pass http://app_backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ترافيك الفرونت إند
    location / {
        proxy_pass http://app_frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
